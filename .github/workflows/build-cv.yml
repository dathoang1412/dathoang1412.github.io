name: Build CV

on:
  push:
    branches: [master]
    paths:
      - "cv/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: cv/main.tex
          work_in_root_file_dir: true

      - name: Move PDF to assets
        run: mv cv/main.pdf assets/cv.pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/cv.pdf
          git diff --staged --quiet || git commit -m "Rebuild CV PDF"
          git push
